name: Reusable Docker Build and Deploy

on:
  workflow_call:
    inputs:
      service-name:
        description: Image name (ex. auth-service)
        required: true
        type: string
      image-tag:
        required: false
        type: string
        default: latest
      working-directory:
        required: false
        type: string
        default: .
    secrets:
      GHCR_TOKEN:
        required: true
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_DEPLOY_PATH:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}
      - id: meta
        run: |
          image="ghcr.io/senlabvisa/${{ inputs.service-name }}:${{ inputs.image-tag }}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.working-directory }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            docker compose pull ${{ inputs.service-name }}
            docker compose up -d ${{ inputs.service-name }}
            docker image prune -f
